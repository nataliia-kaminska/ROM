services:
  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://research:research@postgres:5432/research_matcher
      REDIS_URL: redis://redis:6379/0
      WEBSOCKET_REDIS_ENABLED: "true"
      ELASTICSEARCH_ENABLED: "true"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      AUTO_CREATE_TABLES: "false"
      APP_ENV: docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  worker:
    build: .
    command: python -m app.workers.worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://research:research@postgres:5432/research_matcher
      REDIS_URL: redis://redis:6379/0
      WEBSOCKET_REDIS_ENABLED: "true"
      ELASTICSEARCH_ENABLED: "true"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      AUTO_CREATE_TABLES: "false"
      APP_ENV: docker
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  scheduler:
    build: .
    command: python -m app.workers.scheduler
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://research:research@postgres:5432/research_matcher
      REDIS_URL: redis://redis:6379/0
      WEBSOCKET_REDIS_ENABLED: "true"
      ELASTICSEARCH_ENABLED: "true"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      AUTO_CREATE_TABLES: "false"
      APP_ENV: docker
    depends_on:
      worker:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
      POSTGRES_DB: research_matcher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_matcher"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  elasticsearch_data:
